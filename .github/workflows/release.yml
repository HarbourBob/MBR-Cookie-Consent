name: MBR Cookie Consent - CI & Release

# This workflow runs in two situations:
#   1. On every push to main — runs PHP syntax checks only
#   2. When you push a version tag (e.g. v1.8.0) — runs checks AND
#      builds a zip, then publishes a GitHub Release with it attached

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:

  # ── Job 1: PHP Syntax Check ─────────────────────────────────────────────
  # Runs on every push. Checks every PHP file for parse errors.
  php-lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Check PHP syntax on all files
        run: find . -name "*.php" -not -path "./vendor/*" | xargs -I{} php -l {}

  # ── Job 2: Build & Release ──────────────────────────────────────────────
  # Only runs when you push a version tag (v1.8.0, v1.9.0, etc.)
  # Builds a clean zip and publishes it as a GitHub Release.
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: php-lint                  # Only runs if the lint check passed
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build plugin zip
        run: |
          mkdir -p build
          zip -r build/mbr-cookie-consent-v${{ steps.version.outputs.VERSION }}.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "build/*" \
            --exclude "*.DS_Store" \
            --exclude "node_modules/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MBR Cookie Consent v${{ steps.version.outputs.VERSION }}
          body: |
            ## MBR Cookie Consent v${{ steps.version.outputs.VERSION }}

            Download the zip below and install via WordPress Admin > Plugins > Add New > Upload Plugin.

            See the [readme.txt](https://github.com/${{ github.repository }}/blob/main/readme.txt) for the full changelog.
          files: build/mbr-cookie-consent-v${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
